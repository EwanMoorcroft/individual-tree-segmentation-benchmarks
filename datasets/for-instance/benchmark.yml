# FOR-instance dataset contract. Source point clouds remain outside Git.
project:
  name: tree-seg-benchmark
  dataset_slug: for-instance
  mode: labelled_accuracy_benchmark
  status: benchmark_ready_with_completed_methods
  barkla_root: "~/scratch/tree-seg-benchmark"

dataset:
  slug: for-instance
  name: FOR-instance
  source_url: "https://doi.org/10.5281/zenodo.8287792"
  dataset_root: "~/data/datasets/for_instance/FORinstance_dataset"
  downloaded_and_inspected: true
  split_metadata: "data_split_metadata.csv"
  collections:
    - CULS
    - NIBIO
    - RMIT
    - SCION
    - TUWIEN
  inventory:
    las_file_count: 32
    total_points: 151478959
    reference_tree_count: 1130

pilot:
  collection: CULS
  relative_path: "CULS/plot_1_annotated.las"
  point_count: 1816672
  reference_tree_count: 6
  reason: "Small inspected plot with positive treeID values and semantic classes."

reference:
  mode: labelled_point_cloud
  field: treeID
  ignored_labels:
    - 0
    - -1

semantic:
  field: classification
  valid_tree_classes:
    - 4
    - 5
    - 6
  ignored_classes:
    - 0
    - 1
    - 2
    - 3

candidate_method_slugs:
  - segmentanytree
  - tls2trees
  - treex
  - treelearn
  - randlanet
  - pointnetpp
  - pointgroup
  - softgroup
  - hais
  - mask3d

candidate_method_categories:
  - deep_learning_instance_segmentation
  - lightweight_neural_baseline
  - deterministic_or_traditional_baseline

evaluation:
  enabled: true
  enable_after_prediction_adapter_validation: true
  metrics:
    - precision
    - recall
    - f1
    - mean_matched_iou
  iou_threshold: 0.5
  coordinate_tolerance: 0.01
  require_one_to_one_matching: true
  matching_policy: maximum_cardinality_one_to_one
  primary_evaluation_mask: union_of_reference_tree_and_predicted_tree_points
  split_aggregation: sum_counts_then_compute_micro_metrics
  require_split_compliance: true

outputs:
  predictions_root: "data/predictions/<method>/for_instance"
  metadata_root: "results/metadata/for_instance"
  tables_root: "results/tables/for_instance"

notes:
  - "Use a method-specific wrapper and config before execution."
  - "SegmentAnyTree and TreeX have completed current FOR-instance reporting routes."
  - "TreeLearn and later methods must pass the method-adapter acceptance checklist before full evaluation."
  - "Do not use evaluation-split plots for training or parameter selection."
  - "Confirm positive treeID values before including any plot in evaluation."
