  current_mode: published_pretrained_then_fine_tuned_on_dev
  local_weight_updates_performed: historical_and_completed_fine_tuning
  permitted_for_instance_training_split:
    - dev
  forbidden_training_split:
    - test
  note: "The completed comparison evaluates the released checkpoint, then fine-tunes those weights on development data and evaluates the frozen resulting checkpoint. The earlier from-scratch run remains historical evidence."
