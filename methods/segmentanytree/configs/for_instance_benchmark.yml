evaluation:
  protocol_id: for_instance_pointwise_v1
  status: target_comparison_completed_historical_result_retained
  primary_input: aligned_internal_prediction_arrays
  primary_reporting_split: test
  reference_instance_field: treeID
  reference_semantic_field: classification
  prediction_instance_field: PredInstance
  prediction_semantic_field: PredSemantic
  reference_classes:
    - 4
    - 5
    - 6
  ignored_classes:
    - 0
    - 1
    - 2
    - 3
  ignored_tree_ids:
    - 0
  iou_threshold: 0.5
  threshold_operator: greater_than_or_equal
  published_reproduction_matching_policy: paper_per_prediction_best_iou
  harmonised_matching_policy: maximum_cardinality_one_to_one
  primary_evaluation_mask: union_of_reference_tree_and_predicted_tree_points
  point_correspondence: source_row_or_stable_point_identifier
  coordinate_rematching:
    status: provisional_only
    tolerance: 0.02
    reason: "Coordinate rematching is not the paper-aligned evaluation route and must not replace aligned point-wise labels."
  export_validation:
    required: true
    coordinate_tolerance: 0.001
    require_equal_point_count: true
    require_equal_coordinate_multiset: true
  published_reference_f1:
    CULS: 1.00
    NIBIO: 0.88
    RMIT: 0.84
    SCION: 0.91
    TUWIEN: 0.57
    source: "SegmentAnyTree paper, scenario 5, original-resolution FOR-instance test data."
  reproduction_alert_absolute_f1_difference: 0.10
  metrics:
    - reference_tree_count
    - predicted_tree_count
    - true_positives
    - false_positives
    - false_negatives
    - precision
    - recall
    - f1
    - mean_matched_iou
    - median_matched_iou
    - mean_unweighted_coverage
    - mean_weighted_coverage
    - runtime_seconds
    - peak_memory_gb
  unsupported_metrics:
    - over_segmentation_count
    - under_segmentation_count
  unsupported_metrics_note: "These require an explicit many-to-one and one-to-many definition beyond the current one-to-one evaluator."

