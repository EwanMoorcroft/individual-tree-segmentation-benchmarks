method:
  slug: segmentanytree
  name: SegmentAnyTree
  repo_url: "https://github.com/SmartForest-no/SegmentAnyTree"
  repo_path: "external/SegmentAnyTree"
  external_commit_tested: "a3561ed8447bbb7938f059ba65a3e9c97d6e2ee9"
  execution_mode: apptainer_slurm
  apptainer_image: "~/scratch/containers/segment-any-tree_latest.sif"
  container_source: "docker://maciekwielgosz/segment-any-tree:latest"
  container_digest: null
  container_digest_status: not_captured_in_retained_metadata
  container_working_directory: "/home/nibio/mutable-outside-world"
  container_interface: "bash run_inference.sh <input_dir> <output_dir> <clean_output_dir>"
  python_userbase: "~/fastscratch/segmentanytree_pyuser_v1"
  runtime_root: "~/fastscratch/segmentanytree_runtime"
  runtime_patch_root: "methods/segmentanytree/scripts/runtime/patches"
  command_template: null
  command_template_note: "Inference is run by the Apptainer Slurm scripts; native execution is not configured."
  prediction_output_subpath: final_results
  output_format: labelled_point_cloud
  prediction_instance_field: PredInstance
  prediction_semantic_field: PredSemantic
  ignored_prediction_labels:
    - -1
    - 0
  gpu_required: true
  checkpoint:
    role: released_checkpoint_provisional_route
    filename: PointGroup-PAPER.pt
    sha256: "0b4d74b4644e37a16f59008ad0f5c62894fc4d2d906f3abd803bbfc5b5dd803a"
    provenance_status: "container_checkpoint_hash_verified_repository_overrides_record_mixed_training_but_exact_scenario_unconfirmed"
    training_performed_in_this_repository: false
    execution_entrypoint: eval.py

