    status: completed
    baseline_mode: published_pretrained
    adapted_mode: fine_tuned_on_dev
    source_checkpoint_sha256: "0b4d74b4644e37a16f59008ad0f5c62894fc4d2d906f3abd803bbfc5b5dd803a"
    training_split: dev
    checkpoint_selection_split: dev
    final_reporting_split: test
    from_scratch_training_permitted: false
    preserve_existing_predictions_and_results: true
    public_results: "methods/segmentanytree/examples/sat_completed_target_results_20260711.csv"
    public_provenance: "methods/segmentanytree/examples/sat_completed_target_provenance_20260711.json"
    retention_verifier: "methods/segmentanytree/scripts/evaluation/verify_completed_sat_retention.py"
