    - -1
  postprocessing_selection_permitted: false

success_criteria:
  - The accepted one-plot development smoke evidence is validated before submission.
  - The exact-path manifest contains 21 locally available development plots and no test plots.
  - Each manifest row freezes its source and split-metadata hashes and expected reference inventory.
  - The clean benchmark and TreeLearn commits and exact checkpoint hashes are verified for every task.
  - Every completed plot retains raw full-forest, raw pointwise and aligned prediction artefacts with hashes and sizes.
  - Every expected plot has completed metrics or a documented failure record.
  - Per-plot, per-site and development summaries aggregate counts before micro metrics.
  - No training, tuning or held-out test job is submitted.

failure_indicators:
  - The smoke evidence is missing, changed or not development-only.
  - The exact-path development inventory or expected site counts differ from the frozen contract.
  - Any manifest or metric row is not split dev.
  - A source, split metadata, checkpoint, benchmark commit or upstream commit hash changes.
  - Prediction rows, coordinates, semantics or retained hashes fail validation.
  - An expected plot lacks both completed metrics and a documented failure.
  - Any held-out test path or test job is accessed.
