project:
  name: tree-seg-benchmark
  benchmark_name: for_instance_treex
  dataset_slug: for-instance
  method_slug: treex
  barkla_root: ~/scratch/tree-seg-benchmark
  status: completed_exact_path_subset
  protocol_id: for_instance_pointwise_v1

dataset:
  slug: for-instance
  name: FOR-instance
  root: ~/data/datasets/for_instance/FORinstance_dataset
  split_metadata_file: data_split_metadata.csv
  split_metadata_columns:
    - path
    - folder
    - split
  exact_path_only: true
  allow_basename_fallback: false
  allow_nibio2_remap: false
  metadata_dev_plot_count: 56
  metadata_test_plot_count: 26
  local_dev_plot_count: 21
  local_test_plot_count: 11
  reference_instance_field: treeID
  semantic_field: classification
  tree_classes:
    - 4
    - 5
    - 6
  ignored_tree_ids:
    - 0

method:
  slug: treex
  name: TreeX
  package: pointtree
  repo_url: https://github.com/ai4trees/pointtree
  package_index_url: https://pypi.org/project/pointtree/
  citation_doi: https://doi.org/10.48550/arXiv.2509.03633
  package_version: null
  package_version_status: not_captured_in_completed_exact_path_run
  package_version_note: "The TreeX FOR-instance exact-path subset result is complete for current reporting, but the Barkla package version was not captured in retained metadata."
  algorithm: TreeXAlgorithm
  preset: TreeXPresetULS
  supervised: false
  mode: unsupervised_parameterised
  run_profile: all_points_real_intensity_no_intensity_filter
  params:
    invalid_tree_id: -1
    num_workers: 8
    visualization_folder: null
    random_seed: 0
    stem_search_min_cluster_intensity: null

evaluation:
  iou_threshold: 0.5
  matching: maximum_cardinality_one_to_one
  primary_reporting_protocol: harmonized_union_mask
  primary_evaluation_mask: union_of_reference_tree_and_predicted_tree_points
  report_protocols:
    - harmonized_union_mask
    - reference_labelled_mask_diagnostic

paths:
  barkla_results_root: results/treex_for_instance
  barkla_predictions_root_dev: data/predictions/treex/for_instance
  barkla_predictions_root_test: data/predictions/treex/for_instance_test
  local_prediction_backup_root: local_outputs/treex_predictions
